version: '3.8'
services:
  db:
    image: postgres:15
    container_name: postgres_lab
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./data:/data
volumes:
  pg_data: